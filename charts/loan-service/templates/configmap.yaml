apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "loan-service.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "loan-service.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.PORT | quote }}
  DB_HOST: {{ .Values.config.DB_HOST | quote }}
  DB_NAME: {{ .Values.config.DB_NAME | quote }}
  MQ_URL: {{ .Values.config.MQ_URL | quote }}
  ACCOUNT_SVC_URL: {{ .Values.config.ACCOUNT_SVC_URL | quote }}
