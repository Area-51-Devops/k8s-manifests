apiVersion: v1
kind: Secret
metadata:
  name: {{ include "loan-service.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "loan-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ required "secret.DB_USER must be set" .Values.secret.DB_USER | quote }}
  DB_PASS: {{ required "secret.DB_PASS must be set (use --set secret.DB_PASS=... or an external secrets provider)" .Values.secret.DB_PASS | quote }}
  JWT_SECRET: {{ required "secret.JWT_SECRET must be set (use --set secret.JWT_SECRET=... or an external secrets provider)" .Values.secret.JWT_SECRET | quote }}
