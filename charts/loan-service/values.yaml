# ──────────────────────────────────────────────────────────────
# loan-service Helm values
# Override these per-environment via:
#   helm upgrade --install loan-service ./charts/loan-service \
#     -f values.yaml \
#     -f values-prod.yaml   (or via ArgoCD applicationSet)
# ──────────────────────────────────────────────────────────────

# ── Namespace ─────────────────────────────────────────────────
namespace: backend
# ── Image ─────────────────────────────────────────────────────
image:
  repository: aswin1015/loan-service
  # Overridden by CI to the semantic version tag (e.g. v1.2.3).
  # 'latest' is kept here only as a safe fallback for local dev.
  tag: "v0.2.0"
  pullPolicy: IfNotPresent
# ── Replicas ──────────────────────────────────────────────────
replicaCount: 2
# ── Service ───────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 3005
  targetPort: 3005
# ── Application config (non-sensitive) ────────────────────────
config:
  PORT: "3005"
  DB_HOST: "mysql-0.mysql.data"
  DB_USER: "root"
  DB_NAME: "banking_db"
  MQ_URL: "amqp://rabbitmq.data"
  ACCOUNT_SVC_URL: "http://account-service:3002"
# ── Secrets ───────────────────────────────────────────────────
# Sensitive values should be supplied via:
#   1. External Secrets Operator (recommended for prod)
#   2. helm upgrade --set secret.DB_PASS=... (dev / CI)
# Do NOT commit real credentials here.
secret:
  # DB_PASS is intentionally left empty — set at deploy time.
  DB_PASS: "rootpassword"
  JWT_SECRET: "nexus_banking_secret"
# ── Resources ─────────────────────────────────────────────────
# Tuned for a lightweight Node.js service. Adjust after load testing.
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"
# ── Probes ────────────────────────────────────────────────────
# The service exposes three distinct probe endpoints:
#   /health/startup   – used by startupProbe
#   /health/liveness  – used by livenessProbe  (checks DB connectivity)
#   /health/readiness – used by readinessProbe (isStarted flag)
probes:
  startup:
    path: /health/startup
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30 # 30 × 5 s = 2.5 min max startup window (MySQL + RabbitMQ)
  liveness:
    path: /health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /health/readiness
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3
# ── HorizontalPodAutoscaler ───────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
# ── Pod Disruption Budget ─────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1
# ── Security Context ──────────────────────────────────────────
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: false # node_modules writes at runtime
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
# ── Annotations ───────────────────────────────────────────────
# Uncomment for Prometheus scraping once /metrics is added.
podAnnotations: {}
#  prometheus.io/scrape: "true"
#  prometheus.io/port: "3005"
#  prometheus.io/path: "/metrics"
