apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      # ── SPA routing ──────────────────────────────────────────────────────
      location / {
        try_files $uri /index.html;
      }

      # ── Fallback proxies (services NOT handled by Gateway HTTPRoutes) ─────
      # /api/user/, /api/account/, /api/tx/, /api/loan/, /api/report/
      # are intercepted by Kgateway BEFORE reaching this nginx.
      # Only /api/payment/ and /api/notify/ fall through here.

      location /api/payment/ {
        proxy_pass {{ .Values.nginx.paymentServiceUrl }}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
      }

      location /api/notify/ {
        proxy_pass {{ .Values.nginx.notificationServiceUrl }}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
      }

      # ── Static asset caching ──────────────────────────────────────────────
      location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires {{ .Values.nginx.staticCacheMaxAge }};
        add_header Cache-Control "public, immutable";
        try_files $uri /index.html;
      }
    }
