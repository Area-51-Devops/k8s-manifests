apiVersion: v1
kind: Secret
metadata:
  name: {{ include "account-service.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "account-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ .Values.secret.DB_USER | quote }}
  DB_PASS: {{ required "secret.DB_PASS must be set (use --set secret.DB_PASS=... or an external secrets provider)" .Values.secret.DB_PASS | quote }}
