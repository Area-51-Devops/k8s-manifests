# ──────────────────────────────────────────────────────────────
# fraud-detection-service Helm values
# ──────────────────────────────────────────────────────────────

# ── Namespace ─────────────────────────────────────────────────
namespace: backend
# ── Image ─────────────────────────────────────────────────────
image:
  repository: area51devops/banking-app-fraud-detection-service
  # Overridden by CD pipeline to the semver tag (e.g. v1.2.3).
  tag: "v0.0.1"
  pullPolicy: IfNotPresent
# ── Replicas ──────────────────────────────────────────────────
# Fraud detection is stateless — single replica is fine to start.
# Scale up via HPA once load is characterised.
replicaCount: 1
# ── Service ───────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 3007
  targetPort: 3007
# ── Application config (non-sensitive) ────────────────────────
config:
  PORT: "3007"
  SERVICE_NAME: "fraud-detection-service"
  MQ_URL: "amqp://rabbitmq.data"
  CONFIG_SVC_URL: "http://config-service:3008"
# ── Resources ─────────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"
# ── Init Containers ───────────────────────────────────────────
# Matches the original k8s manifest — waits for RabbitMQ and
# config-service to be ready before the main container starts.
initContainers:
  waitForRabbitmq:
    enabled: true
    image: busybox:1.36
    rabbitmqHost: "rabbitmq.data.svc.cluster.local"
    rabbitmqPort: 5672
  waitForConfig:
    enabled: true
    image: busybox:1.36
    configSvcHealthUrl: "http://config-service:3008/health/startup"
# ── Probes ────────────────────────────────────────────────────
probes:
  startup:
    path: /health/startup
    failureThreshold: 30
    periodSeconds: 5
  liveness:
    path: /health/startup
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 4
  readiness:
    path: /health/startup
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
# ── HorizontalPodAutoscaler ───────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
# ── Pod Disruption Budget ─────────────────────────────────────
podDisruptionBudget:
  enabled: false # Only 1 replica by default — PDB not useful until scaled
# ── Security Context ──────────────────────────────────────────
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
# ── Annotations ───────────────────────────────────────────────
podAnnotations: {}
