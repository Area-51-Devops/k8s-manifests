namespace: backend

image:
  repository: area51devops/banking-app-payment-service
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 3004
  targetPort: 3004

config:
  PORT: "3004"
  SERVICE_NAME: "payment-service"
  DB_HOST: "mysql.data.svc.cluster.local"
  DB_NAME: "banking_db"
  MQ_URL: "amqp://guest:guest@rabbitmq.data.svc.cluster.local:5672"
  ACCOUNT_SVC_URL: "http://account-service:3002"

secrets:
  name: banking-secrets
  keys:
    dbUser: DB_USER
    dbPass: DB_PASS

initContainers:
  waitForMySQL:
    enabled: true
    image: busybox:1.36
    host: "mysql.data.svc.cluster.local"
    port: 3306
  waitForRabbitmq:
    enabled: true
    image: busybox:1.36
    host: "rabbitmq.data.svc.cluster.local"
    port: 5672
  waitForAccount:
    enabled: true
    image: busybox:1.36
    healthUrl: "http://account-service:3002/health/startup"

probes:
  startup:
    path: /health/startup
    failureThreshold: 30
    periodSeconds: 5
  liveness:
    path: /health/liveness
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 4
  readiness:
    path: /health/readiness
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "400m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

podAnnotations: {}
