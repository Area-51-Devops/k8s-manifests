apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "transaction-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "transaction-service.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "transaction-service.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      terminationGracePeriodSeconds: 30
      initContainers:
        {{- if .Values.initContainers.waitForMySQL.enabled }}
        - name: wait-for-mysql
          image: {{ .Values.initContainers.waitForMySQL.image }}
          command: ['sh', '-c', 'until nc -z {{ .Values.initContainers.waitForMySQL.host }} {{ .Values.initContainers.waitForMySQL.port }}; do echo "Waiting for MySQL..."; sleep 3; done']
        {{- end }}
        {{- if .Values.initContainers.waitForRabbitmq.enabled }}
        - name: wait-for-rabbitmq
          image: {{ .Values.initContainers.waitForRabbitmq.image }}
          command: ['sh', '-c', 'until nc -z {{ .Values.initContainers.waitForRabbitmq.host }} {{ .Values.initContainers.waitForRabbitmq.port }}; do echo "Waiting for RabbitMQ..."; sleep 3; done']
        {{- end }}
        {{- if .Values.initContainers.waitForAccount.enabled }}
        - name: wait-for-account
          image: {{ .Values.initContainers.waitForAccount.image }}
          command: ['sh', '-c', 'until wget -qO- {{ .Values.initContainers.waitForAccount.healthUrl }} 2>/dev/null | grep -q UP; do echo "Waiting for account-service..."; sleep 5; done']
        {{- end }}
        {{- if .Values.initContainers.waitForConfig.enabled }}
        - name: wait-for-config
          image: {{ .Values.initContainers.waitForConfig.image }}
          command: ['sh', '-c', 'until wget -qO- {{ .Values.initContainers.waitForConfig.healthUrl }} 2>/dev/null | grep -q UP; do echo "Waiting for config-service..."; sleep 5; done']
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.keys.dbUser }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.keys.dbPass }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
