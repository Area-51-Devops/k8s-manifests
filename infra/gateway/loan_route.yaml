# ─────────────────────────────────────────────────────────────────────────────
# loan_route — direct Gateway routing for /api/loan/
#
# Browser calls:  /api/loan/loans
# loan-service receives: /loans
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loan-route
  namespace: gate
spec:
  parentRefs:
    - name: banking-gateway
      namespace: gate
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/loan/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: loan-service
          namespace: backend
          port: 3005
