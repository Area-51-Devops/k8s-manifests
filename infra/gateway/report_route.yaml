# ─────────────────────────────────────────────────────────────────────────────
# report_route — direct Gateway routing for /api/report/
#
# Browser calls:  /api/report/reports
# reporting-service receives: /reports
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: report-route
  namespace: gate
spec:
  parentRefs:
    - name: banking-gateway
      namespace: gate
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/report/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: reporting-service
          namespace: backend
          port: 3010
