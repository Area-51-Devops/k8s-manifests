# ─────────────────────────────────────────────────────────────────────────────
# tx_route — direct Gateway routing for /api/tx/
#
# Browser calls:  /api/tx/transfer
# transaction-service receives: /transfer
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tx-route
  namespace: gate
spec:
  parentRefs:
    - name: banking-gateway
      namespace: gate
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/tx/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: transaction-service
          namespace: backend
          port: 3003
