# ─────────────────────────────────────────────────────────────────────────────
# Default Deny — blocks ALL ingress and egress in every namespace
# Apply this FIRST, then apply the allow-policies for each namespace.
# ─────────────────────────────────────────────────────────────────────────────

# gate namespace: deny all
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gate
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# frontend namespace: deny all
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: frontend
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# backend namespace: deny all
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: backend
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# data namespace: deny all
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
